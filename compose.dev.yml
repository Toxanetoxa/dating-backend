services:
  postgis:
    hostname: postgis
    container_name: dating-postgis
    image: postgis/postgis:latest
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_DB: ${PG_DB}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - 5432:5432
    volumes:
      - "pgisdata:/var/lib/postgresql/data"

  redis:
    hostname: redis
    container_name: dating-redis
    image: redis:latest
    restart: always
    ports:
      - 6379:6379
    volumes:
      - "./redis-data:/data"

  minio:
    hostname: minio
    volumes:
      - "./data:/data"
    image: quay.io/minio/minio:RELEASE.2023-08-04T17-40-21Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  mc:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/dating;
      /usr/bin/mc anonymous set public myminio/dating;
      exit 0;
      "
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  pgisdata:
  redis-data:
