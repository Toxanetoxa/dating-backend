components:
  schemas:
    LoginRequest:
      required:
        - code
        - email
      type: object
      properties:
        email:
          type: string
          description: email
          example: mail@example.com
        code:
          type: string
          description: однаразовый код
          example: "1234"
    AdminLoginRequest:
      required:
        - password
        - login
      type: object
      properties:
        login:
          type: string
          description: login
          example: clique
        password:
          type: string
          description: password
          example: "123"
    UsersInfo:
      required:
        - ID
        - name
        - phone
        - status
        - photo
      type: object
      properties:
        ID:
          type: string
          description: uuid сообщения
          example: uuid
        name:
          type: string
          description: "name пользователя"
          example: name
        phone:
          type: string
          description: телефон(временно почта)
          example: "example@mail.ru"
        status:
          type: string
          description: статус пользователя
          example: "active"
        photo:
          type: array
          description: фотография
          example: "73href72631f"
    DashBoardSex:
      required:
        - sexStats
        - count
        - male
        - female
        - undefined
      type: object
      properties:
        male:
          type: integer
          description: количество
          example: 1
        female:
          type: integer
          description: количество
          example: 1
        undefined:
          type: integer
          description: количество
          example: 1
    UserInfo:
      required:
        - ID
        - name
        - phone
        - status
        - photo
        - updatedAt
        - createdAt
        - birthday
        - sex
        - about
        - geolocation
      type: object
      properties:
        ID:
          type: string
          description: uuid сообщения
          example: uuid
        name:
          type: string
          description: "name пользователя"
          example: Ivan
        phone:
          type: string
          description: телефон(временно почта)
          example: "example@mail.ru"
        status:
          type: string
          description: статус пользователя
          example: "active"
        photo:
          type: array
          items:
            $ref: '#/components/schemas/UserPhoto'
        updatedAt:
          type: string
          description: Дата обновления в формате YYYY-MM-DD-THH:MM:SS
          example: "2024-03-27T00:00:00Z"
        createdAt:
          type: string
          description: Дата создания в формате YYYY-MM-DD-THH:MM:SS
          example: "2024-03-27T00:00:00Z"
        birthday:
          type: string
          description: Дата рождения в формате YYYY-MM-DD
          example: 2000-06-29
        sex:
          type: string
          description: пол
          example: "male"
        about:
          type: string
          description: обо мне
          example: "ем куриный суп"
        geolocation:
          $ref: '#/components/schemas/Geolocation'
    Geolocation:
      required:
        - lng
        - lat
      type: object
      properties:
        lng:
          type: number
          description: долгота
          example: 1
        lat:
          type: number
          description: широта
          example: 1
    DashBoard:
      required:
        - totalUsers
        - usersByDay
        - usersByWeek
        - usersActive
        - usersNew
        - usersInActive
      type: object
      properties:
        totalUsers:
          type: integer
          description: Количество пользователей всего
          example: 1
        usersByDay:
          type: integer
          description: Количество пользователей зарегистрированных за день
          example: 1
        usersByWeek:
          type: integer
          description: Количество пользователей зарегистрированных за неделю
          example: 1
        usersActive:
          type: integer
          description: Количество активных пользователей
          example: 1
        usersNew:
          type: integer
          description: Количество новых пользователей
          example: 1
        usersInActive:
          type: integer
          description: Количество неактивных пользователей
          example: 1
        sexStats:
          $ref: '#/components/schemas/DashBoardSex'
    RefreshTokenRequest:
      required:
        - refreshToken
      type: object
      properties:
        refreshToken:
          type: string
          description: refresh-токен
          example: test-refresh-token
    UserUpdateRequest:
      required:
        - birthday
        - firstName
        - sex
      type: object
      properties:
        email:
          type: string
          description: E-mail адрес
          example: user@example.com
        firstName:
          type: string
          description: Имя
          example: Вова
        birthday:
          type: string
          description: Дата рождения в формате YYYY-MM-DD
          example: 2000-06-29
        sex:
          type: string
          description: Пол в формате male/female/undefined
          example: male
        city:
          type: string
          description: Город
          example: Москва
        about:
          type: string
          description: Краткое описание о себе
          example: хочу на море
    ErrorResponse:
      required:
        - error
        - success
      type: object
      properties:
        success:
          type: boolean
          description: request success
          example: false
        error:
          required:
            - code
            - message
          type: object
          properties:
            code:
              type: integer
              description: internal error code
              example: 1001
            message:
              type: string
              description: error text
              example: example error
    UserProfile:
      required:
        - ID
      type: object
      properties:
        ID:
          type: string
          description: uuid пользователя
        name:
          type: string
          description: имя
        sex:
          type: string
          description: пол
        birthday:
          type: string
          description: дата рождения
        city:
          type: string
          description: город
        about:
          type: string
          description: о себе
        photos:
          type: array
          items:
            $ref: '#/components/schemas/UserPhoto'
        distance:
          type: integer
          description: расстояние до пользователя в километрах
          example: 4389
    UserPhoto:
      required:
        - ID
        - URL
        - isMain
      type: object
      properties:
        ID:
          type: string
          description: uuid фотографии
          example: 6a7485ca-2020-470d-b0b5-04f3ff19f12f
        URL:
          type: string
          description: URL адрес картинки
          example: https://example.example/example.jpg
        isMain:
          type: boolean
          description: флаг основное фото профиля
          example: false
        createdAt:
          type: string
          description: дата добавления
    Couple:
      required:
        - distance
        - profile
      type: object
      properties:
        distance:
          type: integer
          description: расстояние до пары (в километрах)
          example: 5
        profile:
          $ref: '#/components/schemas/UserProfile'
    Message:
      required:
        - createdAt
        - delivered
        - id
        - isRead
        - text
        - userId
      type: object
      properties:
        id:
          type: string
          description: uuid сообщения
          example: uuid
        userId:
          type: string
          description: "uuid пользователя, отправившего сообщение"
          example: uuid
        text:
          type: string
          description: текст сообщения
          example: "hello, world"
        isRead:
          type: boolean
          description: статус просмотра сообщения
          example: true
        delivered:
          type: boolean
          description: статус доставки
          example: true
        createdAt:
          type: integer
          description: время создания сообщения
          example: 123456778
    Chat:
      required:
        - ID
        - lastMessage
        - profile
      type: object
      properties:
        ID:
          type: string
          description: match uuid
          example: uuid
        profile:
          $ref: '#/components/schemas/UserProfile'
        lastMessage:
          $ref: '#/components/schemas/Message'
        createdAt:
          type: string
          description: дата создания мэтча
    Match:
      required:
        - ID
        - createdAt
        - profile
      type: object
      properties:
        ID:
          type: string
          description: match uuid
          example: 31125d0c-a62d-4f2a-9fb4-b830e19b673f
        profile:
          $ref: '#/components/schemas/UserProfile'
        createdAt:
          type: integer
          description: дата создания мэтча
    BoostInfo:
      required:
        - ID
        - price
        - currency
        - validity
        - name
      properties:
        ID:
          type: integer
          description: "ID продукта/услуги"
          example: 1
        price:
          type: string
          description: "цена"
          example: "29"
        oldPrice:
          type: string
          description: "старая цена (для скидки)"
          example: "99.99"
        currency:
          type: string
          description: "валюта для цены (ISO 4217)"
          example: "RUB"
        discount:
          type: string
          description: "размер скидки в процентах"
          example: "70"
        validity:
          type: integer
          description: "срок действия услуги в секундах"
          example: 3600
        name:
          type: string
          description: "название услуги (для внутренних целей)"
          example: "boost"
    BuyBoost:
      required:
        - link
        - expired
      properties:
        link:
          type: string
          description: "ссылка для оплаты"
          example: https://yoomoney.ru/checkout/payments/v2/contract?orderId=2db236e8
        expired:
          type: string
          description: "время действия ссылки на оплату"
          example: "2024-04-17T22:39:44.5246141+03:00"
    MyProduct:
      required:
        - productID
        - expire
      properties:
        productID:
          type: integer
          description: ID продукта/услуги
          example: 1
        expire:
          type: string
          description: дата, до которой действует услуга/продукт
          example:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
