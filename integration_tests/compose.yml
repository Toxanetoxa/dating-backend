services:
  postgis-integration:
    hostname: postgis
    container_name: postgis-integration
    image: postgis/postgis:latest
    restart: always
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_DB: 'postgres'
      POSTGRES_PASSWORD: 'password'
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - "pgis:/var/lib/postgresql/data"

  redis-integration:
    hostname: redis
    container_name: dating-redis-integration
    image: redis:latest
    restart: always

  minio-integration:
    hostname: minio
    volumes:
      - "./data:/data"
    image: quay.io/minio/minio:RELEASE.2023-08-04T17-40-21Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  mc:
    image: minio/mc
    depends_on:
      - minio-integration
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/dating;
      /usr/bin/mc anonymous set public myminio/dating;
      exit 0;
      "
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  partner-mock:
    image: thiht/smocker
    container_name: partner-mock-integration

  app:
    container_name: dating-backend-app
    build: ../.
    env_file:
      .env.test
    restart: always
    depends_on:
      - partner-mock
      - postgis-integration
      - redis-integration
      - minio-integration

  app-integration:
    build: .
    container_name: integration
    env_file:
      .env.test
    depends_on:
      - app
      - partner-mock
      - postgis-integration
      - redis-integration
      - minio-integration

volumes:
  pgis: